<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>极简社交 V5.1 完美修复版</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* 样式沿用 V4.1/5.0，优化了按钮间距 */
        body { margin: 0; font-family: -apple-system, sans-serif; background: #fafafa; color: #0f1419; }
        .app-container { max-width: 600px; margin: 0 auto; background: #fff; min-height: 100vh; padding-bottom: 70px; border: 1px solid #eff3f4; }
        .header { padding: 15px; border-bottom: 1px solid #eff3f4; font-size: 18px; font-weight: 800; position: sticky; top: 0; background: rgba(255,255,255,0.8); backdrop-filter: blur(10px); z-index: 10; }
        .post { border-bottom: 1px solid #eff3f4; padding: 15px; display: flex; gap: 12px; }
        .avatar { width: 48px; height: 48px; border-radius: 50%; background-color: #eee; background-size: cover; flex-shrink: 0; cursor: pointer; }
        .post-body { flex: 1; }
        .post-content { font-size: 15px; line-height: 1.5; margin-top: 5px; }
        .post-image { max-width: 100%; border-radius: 15px; margin-top: 10px; border: 1px solid #eee; }
        .post-actions { display: flex; justify-content: space-between; margin-top: 12px; max-width: 350px; }
        .action-btn { display: flex; align-items: center; gap: 5px; color: #536471; font-size: 13px; cursor: pointer; transition: 0.2s; }
        .action-btn svg { width: 18px; fill: none; stroke: currentColor; stroke-width: 2; }
        .action-btn.liked { color: #f91880; }
        .action-btn.liked svg { fill: #f91880; stroke: #f91880; }
        .compose-area { padding: 15px; border-bottom: 1px solid #eff3f4; display: flex; gap: 12px; }
        .compose-input { flex: 1; border: none; outline: none; font-size: 18px; resize: none; min-height: 60px; }
        .submit-btn { background: #1d9bf0; color: white; border: none; padding: 8px 16px; border-radius: 20px; font-weight: 700; cursor: pointer; }
        .edit-form { display: none; flex-direction: column; gap: 10px; padding: 15px; background: #f7f9f9; border-radius: 10px; margin: 10px; }
        .edit-input { padding: 10px; border: 1px solid #ddd; border-radius: 5px; }
        .bottom-nav { position: fixed; bottom: 0; width: 100%; max-width: 600px; display: flex; background: #fff; border-top: 1px solid #eee; }
        .nav-item { flex: 1; text-align: center; padding: 15px; cursor: pointer; color: #536471; }
        .nav-item.active { color: #000; font-weight: bold; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: none; z-index: 100; align-items: flex-end; }
        .modal-content { background: #fff; width: 100%; max-width: 600px; height: 80vh; border-radius: 20px 20px 0 0; display: flex; flex-direction: column; margin: 0 auto; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header" id="header-title">首页</div>

    <div id="home" class="tab-content active">
        <div class="compose-area">
            <div class="avatar my-avatar"></div>
            <div style="flex:1">
                <textarea id="post-text" class="compose-input" placeholder="分享新鲜事..."></textarea>
                <input type="file" id="post-file" style="display:none" onchange="uploadImg('post')">
                <div style="display:flex; justify-content: space-between; align-items:center;">
                    <span onclick="document.getElementById('post-file').click()" style="cursor:pointer; color:#1d9bf0">🖼️ 图片</span>
                    <button class="submit-btn" onclick="publishPost()">发布</button>
                </div>
                <img id="post-img-preview" style="display:none; width:80px; margin-top:10px; border-radius:8px;">
            </div>
        </div>
        <div id="feed"></div>
    </div>

    <div id="profile" class="tab-content">
        <div class="profile-header">
            <div class="avatar my-avatar" style="width:80px; height:80px; margin: 20px auto;"></div>
            <div style="text-align:center">
                <h2 id="show-name">载入中...</h2>
                <p id="show-bio">简介加载中</p>
                <p style="font-size:14px; color:#536471">
                    📍<span id="show-region">未知</span> | 
                    ✨<span id="show-constellation">未设置</span> | 
                    🎂<span id="show-birthday">未设置</span>
                </p>
                <button class="submit-btn" style="background:#eee; color:#000; margin-bottom:20px" onclick="toggleEdit()">编辑资料</button>
            </div>
            
            <div class="edit-form" id="edit-box">
                <input type="text" id="in-name" class="edit-input" placeholder="名字">
                <select id="in-region" class="edit-input">
                    <option value="中国">中国</option><option value="美国">美国</option><option value="日本">日本</option>
                </select>
                <input type="text" id="in-constellation" class="edit-input" placeholder="星座 (如：狮子座)">
                <input type="date" id="in-birthday" class="edit-input">
                <textarea id="in-bio" class="edit-input" placeholder="个人简介"></textarea>
                <button class="submit-btn" onclick="saveProfile()">保存</button>
            </div>
        </div>
        <div id="my-posts"></div>
    </div>

    <div class="bottom-nav">
        <div class="nav-item active" onclick="showTab('home')">首页</div>
        <div class="nav-item" onclick="showTab('profile')">我的</div>
    </div>
</div>

<div class="modal-overlay" id="comment-modal">
    <div class="modal-content">
        <div style="padding:15px; border-bottom:1px solid #eee; display:flex; justify-content:space-between">
            <span onclick="closeComment()">关闭</span>
            <strong>评论</strong>
            <span></span>
        </div>
        <div id="comment-list" style="flex:1; overflow-y:auto"></div>
        <div class="compose-area" style="border-top:1px solid #eee">
            <textarea id="reply-text" class="compose-input" placeholder="发布你的回复..." style="font-size:15px"></textarea>
            <input type="file" id="reply-file" style="display:none" onchange="uploadImg('reply')">
            <button class="submit-btn" onclick="submitComment()">回复</button>
        </div>
        <div style="padding:10px"><span onclick="document.getElementById('reply-file').click()" style="cursor:pointer">🖼️ 附图</span></div>
    </div>
</div>

<script>
    // --- 配置区 ---
    const PROJECT_URL = 'https://podskdvqrhxvhnwylvsx.supabase.co'; 
    const ANON_KEY = 'sb_publishable_9Kow0JDI_jpqiWm4ne5Zjg_HlDA3wr8';
    const db = supabase.createClient(PROJECT_URL, ANON_KEY);

    let myInfo = { id:'me', name:'访客', bio:'', region:'中国', constellation:'', birthday:'' };
    let tempImg = ""; 
    let activeId = null;

    // --- 图标 ---
    const iconL = `<svg viewBox="0 0 24 24"><path d="M16.697 5.5c-1.222-.06-2.679.51-3.89 2.16l-.805 1.09-.806-1.09C9.984 6.01 8.526 5.44 7.304 5.5c-1.243.07-2.349.78-2.91 1.91-.552 1.12-.633 2.78.479 4.82 1.074 1.97 3.257 4.27 7.129 6.61 3.87-2.34 6.052-4.64 7.126-6.61 1.111-2.04 1.03-3.7.477-4.82-.561-1.13-1.666-1.84-2.908-1.91zm4.187 7.69c-1.351 2.48-4.001 5.12-8.379 7.67l-.503.3-.504-.3c-4.379-2.55-7.029-5.19-8.382-7.67-1.36-2.5-1.41-4.86-.514-6.67.887-1.79 2.647-2.91 4.601-3.01 1.651-.09 3.368.56 4.798 2.01 1.429-1.45 3.146-2.1 4.796-2.01 1.954.1 3.714 1.22 4.601 3.01.896 1.81.846 4.17-.514 6.67z"></path></svg>`;
    const iconC = `<svg viewBox="0 0 24 24"><path d="M1.751 10c0-4.42 3.584-8 8.005-8h4.366c4.49 0 8.129 3.64 8.129 8.13 0 2.96-1.607 5.68-4.196 7.11l-8.054 4.46v-3.69h-.067c-4.49.1-8.183-3.51-8.183-8.01zm8.005-6c-3.317 0-6.005 2.69-6.005 6 0 3.37 2.77 6.08 6.138 6.01l.351-.01h1.761v2.3l5.087-2.81c1.951-1.08 3.163-3.13 3.163-5.36 0-3.39-2.744-6.13-6.129-6.13H9.756z"></path></svg>`;
    const iconS = `<svg viewBox="0 0 24 24"><path d="M12 2.59l5.7 5.7-1.41 1.42L13 6.41V16h-2V6.41l-3.3 3.3-1.41-1.42L12 2.59zM21 15l-.02 3.51c0 1.38-1.12 2.49-2.5 2.49H5.5C4.11 21 3 19.88 3 18.5V15h2v3.5c0 .28.22.5.5.5h12.98c.28 0 .5-.22.5-.5L19 15h2z"></path></svg>`;

    // --- 核心逻辑 ---
    async function init() {
        const { data } = await db.from('profiles').select('*').eq('id', 'me').single();
        if(data) {
            myInfo = data;
            updateUI();
        }
        loadPosts();
    }

    function updateUI() {
        document.getElementById('show-name').innerText = myInfo.name;
        document.getElementById('show-bio').innerText = myInfo.bio || "暂无简介";
        document.getElementById('show-region').innerText = myInfo.region;
        document.getElementById('show-constellation').innerText = myInfo.constellation || "未设置";
        document.getElementById('show-birthday').innerText = myInfo.birthday || "未设置";
    }

    async function loadPosts() {
        const { data } = await db.from('posts').select('*').order('created_at', {ascending: false});
        const { data: comms } = await db.from('comments').select('post_id');
        
        const feed = document.getElementById('feed');
        feed.innerHTML = data.map(p => {
            const cCount = comms.filter(c => c.post_id === p.id).length;
            return `
                <div class="post">
                    <div class="avatar" style="background-image:url(${p.author_id==='me'?myInfo.avatar:''})"></div>
                    <div class="post-body">
                        <div style="font-weight:bold">${p.author_name}</div>
                        <div class="post-content">${p.content}</div>
                        ${p.image_url ? `<img src="${p.image_url}" class="post-image">` : ''}
                        <div class="post-actions">
                            <span class="action-btn" onclick="handleLike(${p.id}, ${p.likes}, this)">${iconL} <span class="count">${p.likes}</span></span>
                            <span class="action-btn" onclick="openComment(${p.id})">${iconC} <span>${cCount}</span></span>
                            <span class="action-btn" onclick="shareIt()">${iconS}</span>
                        </div>
                    </div>
                </div>
            `;
        }).join('');
    }

    async function handleLike(id, cur, btn) {
        btn.classList.toggle('liked');
        const isAdd = btn.classList.contains('liked');
        const next = isAdd ? cur + 1 : Math.max(0, cur - 1);
        btn.querySelector('.count').innerText = next;
        await db.from('posts').update({ likes: next }).eq('id', id);
    }

    async function publishPost() {
        const txt = document.getElementById('post-text').value;
        if(!txt && !tempImg) return;
        await db.from('posts').insert([{ author_id:'me', author_name:myInfo.name, content:txt, image_url:tempImg, likes:0 }]);
        document.getElementById('post-text').value = "";
        tempImg = "";
        document.getElementById('post-img-preview').style.display='none';
        loadPosts();
    }

    // --- 评论图片修复 ---
    async function submitComment() {
        const txt = document.getElementById('reply-text').value;
        if(!txt && !tempImg) return;
        await db.from('comments').insert([{ post_id: activeId, author_id:'me', author_name:myInfo.name, content:txt, image_url:tempImg }]);
        document.getElementById('reply-text').value = "";
        tempImg = "";
        renderComments();
    }

    async function renderComments() {
        const { data } = await db.from('comments').select('*').eq('post_id', activeId);
        document.getElementById('comment-list').innerHTML = data.map(c => `
            <div class="post" style="border-bottom:1px solid #eee; padding:10px">
                <div class="avatar" style="width:32px; height:32px"></div>
                <div>
                    <div style="font-weight:bold; font-size:13px">${c.author_name}</div>
                    <div style="font-size:14px">${c.content}</div>
                    ${c.image_url ? `<img src="${c.image_url}" style="width:100px; margin-top:5px; border-radius:5px">` : ''}
                </div>
            </div>
        `).join('');
    }

    // --- 个人资料修改修复 ---
    function toggleEdit() {
        const box = document.getElementById('edit-box');
        box.style.display = box.style.display === 'flex' ? 'none' : 'flex';
        document.getElementById('in-name').value = myInfo.name;
        document.getElementById('in-region').value = myInfo.region;
        document.getElementById('in-bio').value = myInfo.bio;
        document.getElementById('in-constellation').value = myInfo.constellation || "";
        document.getElementById('in-birthday').value = myInfo.birthday || "";
    }

    async function saveProfile() {
        const update = {
            id: 'me',
            name: document.getElementById('in-name').value,
            region: document.getElementById('in-region').value,
            bio: document.getElementById('in-bio').value,
            constellation: document.getElementById('in-constellation').value,
            birthday: document.getElementById('in-birthday').value
        };
        await db.from('profiles').upsert([update]);
        myInfo = { ...myInfo, ...update };
        updateUI();
        document.getElementById('edit-box').style.display = 'none';
    }

    // --- 通用功能 ---
    function uploadImg(type) {
        const file = event.target.files[0];
        const reader = new FileReader();
        reader.onload = (e) => {
            tempImg = e.target.result;
            if(type==='post') {
                const pre = document.getElementById('post-img-preview');
                pre.src = tempImg; pre.style.display = 'block';
            }
        };
        reader.readAsDataURL(file);
    }

    function shareIt() { alert("链接已复制到剪贴板！"); }
    function openComment(id) { activeId = id; document.getElementById('comment-modal').style.display='flex'; renderComments(); }
    function closeComment() { document.getElementById('comment-modal').style.display='none'; }
    function showTab(id) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.getElementById('header-title').innerText = id === 'home' ? '首页' : '我的资料';
    }

    window.onload = init;
</script>
</body>
</html>
