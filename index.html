<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>极简社交 V5.4 终极全能版</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { margin: 0; font-family: -apple-system, sans-serif; background: #fff; color: #0f1419; overflow-x: hidden; }
        .app-container { max-width: 600px; margin: 0 auto; min-height: 100vh; padding-bottom: 60px; border: 1px solid #eee; position: relative; }
        .header { padding: 15px; border-bottom: 1px solid #eee; font-size: 20px; font-weight: 800; position: sticky; top: 0; background: rgba(255,255,255,0.9); backdrop-filter: blur(10px); z-index: 10; display: flex; justify-content: space-between; align-items: center; }
        
        /* 选项卡切换 */
        .tabs { display: flex; border-bottom: 1px solid #eee; }
        .tab { flex: 1; text-align: center; padding: 15px; font-weight: bold; color: #536471; cursor: pointer; border-bottom: 3px solid transparent; }
        .tab.active { color: #1d9bf0; border-bottom-color: #1d9bf0; }

        /* 发布区 */
        .compose { padding: 15px; border-bottom: 1px solid #eee; display: flex; gap: 12px; }
        .avatar { width: 48px; height: 48px; border-radius: 50%; background: #eee; flex-shrink: 0; background-size: cover; background-position: center; }
        .compose-main { flex: 1; }
        .compose-input { width: 100%; border: none; outline: none; font-size: 18px; resize: none; min-height: 50px; }
        .compose-tools { display: flex; justify-content: space-between; align-items: center; margin-top: 10px; }
        
        /* 动态样式 */
        .post { border-bottom: 1px solid #eee; padding: 15px; display: flex; gap: 12px; }
        .post-content { font-size: 15px; line-height: 1.5; margin-top: 4px; white-space: pre-wrap; }
        .post-img { width: 100%; border-radius: 15px; margin-top: 10px; border: 1px solid #f0f0f0; }
        .post-actions { display: flex; justify-content: space-between; margin-top: 12px; max-width: 400px; color: #536471; }
        .action { display: flex; align-items: center; gap: 5px; cursor: pointer; transition: 0.2s; }
        .action.liked { color: #f91880; font-weight: bold; }

        /* 个人资料与星座选择 */
        .profile-box { padding: 20px; text-align: center; border-bottom: 1px solid #eee; }
        .meta-info { font-size: 14px; color: #1d9bf0; margin: 10px 0; display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; }
        .meta-tag { background: #f0f7ff; padding: 4px 10px; border-radius: 12px; cursor: pointer; }
        
        /* 星座选择器菜单 */
        .const-menu { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: none; z-index: 1000; align-items: center; justify-content: center; }
        .menu-content { background: #fff; width: 80%; max-width: 300px; border-radius: 15px; overflow: hidden; }
        .menu-item { padding: 15px; text-align: center; border-bottom: 1px solid #eee; cursor: pointer; }
        .menu-item:hover { background: #f7f9f9; }

        /* 底部导航 */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; max-width: 600px; display: flex; background: #fff; border-top: 1px solid #eee; height: 55px; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; font-size: 22px; color: #536471; }
        .nav-item.active { color: #1d9bf0; }

        .view { display: none; }
        .view.active { display: block; }
        
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: none; z-index: 200; align-items: flex-end; }
        .modal-body { background: #fff; width: 100%; max-width: 600px; height: 80vh; border-radius: 20px 20px 0 0; display: flex; flex-direction: column; margin: 0 auto; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header"><span id="title">首页</span></div>

    <div id="v-home" class="view active">
        <div class="tabs">
            <div class="tab active" onclick="setFeed('all')">推荐</div>
            <div class="tab" onclick="setFeed('follow')">关注</div>
        </div>
        <div class="compose">
            <div class="avatar" id="my-avatar-top"></div>
            <div class="compose-main">
                <textarea id="inp-text" class="compose-input" placeholder="有什么新鲜事？"></textarea>
                <img id="pre-post" style="display:none; width:100%; border-radius:15px; margin:10px 0;">
                <div class="compose-tools">
                    <span onclick="document.getElementById('f-post').click()" style="cursor:pointer; font-size:20px;">🖼️</span>
                    <input type="file" id="f-post" hidden onchange="handleFile(event, 'pre-post')">
                    <button onclick="publish()" style="background:#1d9bf0; color:#fff; border:none; padding:8px 18px; border-radius:20px; font-weight:bold; cursor:pointer;">发布</button>
                </div>
            </div>
        </div>
        <div id="list-all"></div>
    </div>

    <div id="v-msg" class="view">
        <div style="padding:15px; border-bottom:1px solid #f7f7f7">🔔 欢迎使用极简社交！</div>
        <div style="padding:15px; border-bottom:1px solid #f7f7f7">❤️ 有人悄悄点赞了你的动态</div>
        <div style="padding:15px; border-bottom:1px solid #f7f7f7">💬 您收到一条新的评论回复</div>
    </div>

    <div id="v-me" class="view">
        <div class="profile-box">
            <div class="avatar" style="width:80px; height:80px; margin:0 auto;"></div>
            <h2 id="p-name">加载中...</h2>
            <div id="p-bio">简介加载中</div>
            <div class="meta-info">
                <span class="meta-tag" id="p-reg">📍 未知</span>
                <span class="meta-tag" onclick="openConstMenu()" id="p-const">✨ 点击选星座</span>
                <span class="meta-tag" id="p-birth">🎂 生日未设</span>
            </div>
            <button onclick="document.getElementById('edit-panel').style.display='block'" style="background:#fff; border:1px solid #ddd; padding:6px 15px; border-radius:20px;">编辑资料</button>

            <div id="edit-panel" style="display:none; text-align:left; background:#f9f9f9; padding:15px; border-radius:10px; margin-top:15px;">
                <input id="i-name" placeholder="名字" style="width:100%; padding:10px; margin-bottom:10px;">
                <input id="i-reg" placeholder="地区" style="width:100%; padding:10px; margin-bottom:10px;">
                <input id="i-birth" type="date" style="width:100%; padding:10px; margin-bottom:10px;">
                <textarea id="i-bio" placeholder="个人简介" style="width:100%; padding:10px; margin-bottom:10px;"></textarea>
                <button onclick="saveProfile()" style="width:100%; background:#000; color:#fff; padding:10px; border:none; border-radius:5px;">保存信息</button>
            </div>
        </div>
        <div id="list-mine"></div>
    </div>

    <div class="bottom-nav">
        <div class="nav-item active" onclick="switchNav('home')">🏠</div>
        <div class="nav-item" onclick="switchNav('home', 'follow')">👥</div>
        <div class="nav-item" onclick="switchNav('msg')">🔔</div>
        <div class="nav-item" onclick="switchNav('me')">👤</div>
    </div>
</div>

<div class="const-menu" id="const-menu">
    <div class="menu-content">
        <div style="padding:15px; font-weight:bold; border-bottom:1px solid #eee; text-align:center;">选择你的星座</div>
        <div style="max-height:300px; overflow-y:auto;">
            <div class="menu-item" onclick="selectConst('白羊座')">♈ 白羊座</div>
            <div class="menu-item" onclick="selectConst('金牛座')">♉ 金牛座</div>
            <div class="menu-item" onclick="selectConst('双子座')">♊ 双子座</div>
            <div class="menu-item" onclick="selectConst('巨蟹座')">♋ 巨蟹座</div>
            <div class="menu-item" onclick="selectConst('狮子座')">♌ 狮子座</div>
            <div class="menu-item" onclick="selectConst('处女座')">♍ 处女座</div>
            <div class="menu-item" onclick="selectConst('天秤座')">♎ 天秤座</div>
            <div class="menu-item" onclick="selectConst('天蝎座')">♏ 天蝎座</div>
            <div class="menu-item" onclick="selectConst('射手座')">♐ 射手座</div>
            <div class="menu-item" onclick="selectConst('摩羯座')">♑ 摩羯座</div>
            <div class="menu-item" onclick="selectConst('水瓶座')">♒ 水瓶座</div>
            <div class="menu-item" onclick="selectConst('双鱼座')">♓ 双鱼座</div>
        </div>
        <div class="menu-item" style="color:red; font-weight:bold;" onclick="closeConstMenu()">取消</div>
    </div>
</div>

<div class="modal" id="modal-reply">
    <div class="modal-body">
        <div style="padding:15px; border-bottom:1px solid #eee; display:flex; justify-content:space-between">
            <span onclick="closeReply()" style="cursor:pointer">取消</span>
            <strong>发布回复</strong>
            <span></span>
        </div>
        <div id="reply-list" style="flex:1; overflow-y:auto; padding:15px;"></div>
        <div class="compose" style="border-top:1px solid #eee">
            <textarea id="reply-inp" placeholder="发布你的回复" style="font-size:16px"></textarea>
            <button onclick="submitReply()" style="background:#1d9bf0; color:#fff; border:none; padding:5px 15px; border-radius:20px">回复</button>
        </div>
    </div>
</div>

<script>
    const PROJECT_URL = 'https://podskdvqrhxvhnwylvsx.supabase.co';
    const ANON_KEY = 'sb_publishable_9Kow0JDI_jpqiWm4ne5Zjg_HlDA3wr8';
    const db = supabase.createClient(PROJECT_URL, ANON_KEY);

    let my = { id:'me', name:'探索者', bio:'', region:'中国', constellation:'', birthday:'' };
    let postImg = "";
    let curPId = null;

    async function init() {
        const { data } = await db.from('profiles').select('*').eq('id', 'me').single();
        if(data) { my = data; renderProfile(); }
        loadFeed('all');
    }

    function renderProfile() {
        document.getElementById('p-name').innerText = my.name;
        document.getElementById('p-bio').innerText = my.bio || "暂无个人简介";
        document.getElementById('p-reg').innerText = "📍 " + (my.region || "地区");
        document.getElementById('p-const').innerText = "✨ " + (my.constellation || "点击选星座");
        document.getElementById('p-birth').innerText = "🎂 " + (my.birthday || "生日未设");
    }

    async function loadFeed(type) {
        let q = db.from('posts').select('*').order('created_at', {ascending:false});
        if(type === 'follow') q = q.eq('author_id', 'me'); // 模拟关注：显示自己的
        
        const { data: posts } = await q;
        const { data: comms } = await db.from('comments').select('post_id');
        
        const container = type === 'me' ? document.getElementById('list-mine') : document.getElementById('list-all');
        container.innerHTML = posts.map(p => {
            const cCount = comms.filter(c => c.post_id === p.id).length;
            return `
                <div class="post">
                    <div class="avatar"></div>
                    <div class="post-body">
                        <div style="font-weight:800">${p.author_name}</div>
                        <div class="post-content">${p.content}</div>
                        ${p.image_url ? `<img src="${p.image_url}" class="post-img">`:''}
                        <div class="post-actions">
                            <div class="action" onclick="like(${p.id}, ${p.likes}, this)">❤️ <span>${p.likes}</span></div>
                            <div class="action" onclick="openReply(${p.id})">💬 <span>${cCount}</span></div>
                            <div class="action" onclick="alert('已转发')">🔄</div>
                            <div class="action">📤</div>
                        </div>
                    </div>
                </div>
            `;
        }).join('');
    }

    async function like(id, cur, el) {
        el.classList.toggle('liked');
        const isAdd = el.classList.contains('liked');
        const next = isAdd ? cur + 1 : Math.max(0, cur - 1);
        el.querySelector('span').innerText = next;
        await db.from('posts').update({ likes: next }).eq('id', id);
    }

    async function publish() {
        const txt = document.getElementById('inp-text').value;
        if(!txt && !postImg) return;
        await db.from('posts').insert([{ author_id:'me', author_name:my.name, content:txt, image_url:postImg, likes:0 }]);
        location.reload();
    }

    async function saveProfile() {
        const up = {
            id: 'me',
            name: document.getElementById('i-name').value,
            region: document.getElementById('i-reg').value,
            birthday: document.getElementById('i-birth').value,
            bio: document.getElementById('i-bio').value
        };
        await db.from('profiles').upsert([up]);
        my = {...my, ...up};
        renderProfile();
        document.getElementById('edit-panel').style.display='none';
    }

    // --- 星座二级菜单功能 ---
    function openConstMenu() { document.getElementById('const-menu').style.display='flex'; }
    function closeConstMenu() { document.getElementById('const-menu').style.display='none'; }
    async function selectConst(name) {
        await db.from('profiles').upsert([{ id:'me', constellation: name }]);
        my.constellation = name;
        renderProfile();
        closeConstMenu();
    }

    function switchNav(v, subType) {
        document.querySelectorAll('.view').forEach(view => view.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(nav => nav.classList.remove('active'));
        document.getElementById('v-'+v).classList.add('active');
        
        if(v === 'home') {
            document.getElementById('title').innerText = '首页';
            setFeed(subType || 'all');
        } else {
            document.getElementById('title').innerText = v === 'msg' ? '通知' : '个人主页';
            if(v === 'me') loadFeed('me');
        }
    }

    function setFeed(type) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        if(type === 'follow') document.querySelectorAll('.tab')[1].classList.add('active');
        else document.querySelectorAll('.tab')[0].classList.add('active');
        loadFeed(type);
    }

    function handleFile(e, preId) {
        const r = new FileReader();
        r.onload = (ev) => {
            postImg = ev.target.result;
            document.getElementById(preId).src = postImg;
            document.getElementById(preId).style.display = 'block';
        };
        r.readAsDataURL(e.target.files[0]);
    }

    function openReply(id) { curPId = id; document.getElementById('modal-reply').style.display='flex'; renderReply(); }
    function closeReply() { document.getElementById('modal-reply').style.display='none'; }
    async function renderReply() {
        const { data } = await db.from('comments').select('*').eq('post_id', curPId);
        document.getElementById('reply-list').innerHTML = data.map(c => `
            <div style="margin-bottom:15px; border-bottom:1px solid #eee; padding-bottom:10px">
                <div style="font-weight:bold; font-size:14px">${c.author_name}</div>
                <div style="font-size:14px">${c.content}</div>
            </div>
        `).join('');
    }
    async function submitReply() {
        const val = document.getElementById('reply-inp').value;
        if(!val) return;
        await db.from('comments').insert([{ post_id: curPId, author_id:'me', author_name:my.name, content:val }]);
        document.getElementById('reply-inp').value = "";
        renderReply();
    }

    window.onload = init;
</script>
</body>
</html>
